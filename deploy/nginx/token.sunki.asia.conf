# AIGate Shell - 对外展示的壳网站
# HTTP :1002
#
# 简化架构：
#   /          → AIGate 落地页（自定义）
#   其他所有    → new-api 代理 + sub_filter 品牌清洗
#   /api/      → new-api 后端 API
#   /v1/       → OpenAI 兼容接口
#
# 登录、注册、仪表盘全部由 new-api 原生处理，
# 通过 sub_filter 清洗品牌标识，用户看到 "AIGate" 而非 "New API"

server {
    listen 1002;
    listen [::]:1002;
    server_name token.sunki.asia;

    # ========================================
    # AIGate 落地页（仅根路径）
    # ========================================
    location = / {
        rewrite ^ /aigate-app/index.html last;
    }
    location /aigate-app/ {
        internal;
        alias /var/www/aigate/;
    }

    # ========================================
    # AIGate 前端静态资源（/aigate-assets/ 避免跟 new-api 的 /assets/ 冲突）
    # ========================================
    location /aigate-assets/ {
        root /var/www/aigate;
        try_files $uri =404;
    }

    # ========================================
    # new-api 前端静态资源（JS/CSS）- 需要 sub_filter 品牌清洗
    # ========================================
    location /assets/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header New-Api-User $http_aigate_user;
        proxy_redirect off;

        # 品牌清洗（JS 中有 "New API" 等字符串）
        # 注意：sub_filter 按声明顺序执行，更具体的模式要先声明
        proxy_set_header Accept-Encoding "";
        sub_filter 'Calcium-Ion/new-api' 'AIGate/aigate';
        sub_filter 'QuantumNous/new-api' 'AIGate/aigate';
        sub_filter 'newapi.pro' 'aigate.net';
        sub_filter 'docs.newapi' 'docs.aigate';
        sub_filter 'New API' 'AIGate';
        sub_filter 'new-api' 'aigate';
        sub_filter 'new_api' 'aigate';
        sub_filter 'NewAPI' 'AIGate';
        sub_filter 'NEWAPI' 'AIGATE';
        sub_filter 'newapi' 'aigate';
        sub_filter 'common.changeLanguage' '语言';
        sub_filter 'QuantumNous' 'AIGate';
        sub_filter_types text/javascript application/javascript text/css;
        sub_filter_once off;

        proxy_hide_header X-New-Api-Version;
        proxy_hide_header X-Oneapi-Request-Id;
        expires 7d;
    }

    # ========================================
    # API 代理：new-api 后端
    # ========================================
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header New-Api-User $http_aigate_user;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;

        proxy_pass_header Set-Cookie;
        proxy_cookie_path / "/; SameSite=Lax";

        # 响应清洗
        proxy_set_header Accept-Encoding "";
        sub_filter 'Calcium-Ion/new-api' 'AIGate/aigate';
        sub_filter 'QuantumNous/new-api' 'AIGate/aigate';
        sub_filter 'newapi.pro' 'aigate.net';
        sub_filter 'docs.newapi' 'docs.aigate';
        sub_filter '"self_use_mode_enabled":true' '"self_use_mode_enabled":false';
        sub_filter 'New API' 'AIGate';
        sub_filter 'new-api' 'aigate';
        sub_filter 'new_api' 'aigate';
        sub_filter 'NewAPI' 'AIGate';
        sub_filter 'NEWAPI' 'AIGATE';
        sub_filter 'newapi' 'aigate';
        sub_filter 'QuantumNous' 'AIGate';
        sub_filter_types application/json text/plain;
        sub_filter_once off;

        proxy_hide_header X-New-Api-Version;
        proxy_hide_header X-Oneapi-Request-Id;
    }

    # ========================================
    # OpenAI 兼容接口
    # ========================================
    location /v1/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header New-Api-User $http_aigate_user;
        proxy_redirect off;

        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        proxy_hide_header X-New-Api-Version;
        proxy_hide_header X-Oneapi-Request-Id;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # ========================================
    # 兜底：所有其他路径 → new-api 代理 + 全面清洗
    # /login, /register, /console, /panel, /about, /pricing 等
    # ========================================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header New-Api-User $http_aigate_user;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;

        proxy_pass_header Set-Cookie;
        proxy_cookie_path / "/; SameSite=Lax";

        # 全面品牌清洗（HTML、JS、JSON、CSS）
        proxy_set_header Accept-Encoding "";
        sub_filter 'Calcium-Ion/new-api' 'AIGate/aigate';
        sub_filter 'QuantumNous/new-api' 'AIGate/aigate';
        sub_filter 'newapi.pro' 'aigate.net';
        sub_filter 'docs.newapi' 'docs.aigate';
        sub_filter '"self_use_mode_enabled":true' '"self_use_mode_enabled":false';
        sub_filter 'New API' 'AIGate';
        sub_filter 'new-api' 'aigate';
        sub_filter 'new_api' 'aigate';
        sub_filter 'NewAPI' 'AIGate';
        sub_filter 'NEWAPI' 'AIGATE';
        sub_filter 'newapi' 'aigate';
        sub_filter 'common.changeLanguage' '语言';
        sub_filter 'QuantumNous' 'AIGate';
        sub_filter_types text/javascript application/javascript application/json text/plain text/css;
        sub_filter_once off;

        proxy_hide_header X-New-Api-Version;
        proxy_hide_header X-Oneapi-Request-Id;
    }

    # AIGate 静态资源找不到时回落到 new-api
    location @newapi {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header New-Api-User $http_aigate_user;
        proxy_redirect off;

        proxy_set_header Accept-Encoding "";
        sub_filter 'Calcium-Ion/new-api' 'AIGate/aigate';
        sub_filter 'QuantumNous/new-api' 'AIGate/aigate';
        sub_filter 'newapi.pro' 'aigate.net';
        sub_filter 'docs.newapi' 'docs.aigate';
        sub_filter 'New API' 'AIGate';
        sub_filter 'new-api' 'aigate';
        sub_filter 'new_api' 'aigate';
        sub_filter 'NewAPI' 'AIGate';
        sub_filter 'NEWAPI' 'AIGATE';
        sub_filter 'newapi' 'aigate';
        sub_filter 'common.changeLanguage' '语言';
        sub_filter 'QuantumNous' 'AIGate';
        sub_filter_types text/javascript text/css;
        sub_filter_once off;

        proxy_hide_header X-New-Api-Version;
        proxy_hide_header X-Oneapi-Request-Id;
    }
}

# 管理员直连 new-api 原始界面 - HTTP :1003
server {
    listen 1003;
    listen [::]:1003;
    server_name token.sunki.asia;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_redirect off;

        proxy_buffering off;
        proxy_cache off;

        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
